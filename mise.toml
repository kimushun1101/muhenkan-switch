# mise.toml — 開発環境 & タスク定義
# 使い方:
#   mise install         Rust ツールチェーンのセットアップ
#   mise run setup       Linux: ビルド依存 + uinput パーミッション設定（初回のみ）
#   mise run sync-kanata-version  kanata バージョンを全ファイルに同期
#   mise run fetch-kanata 開発用 kanata バイナリをダウンロード
#   mise run build       debug ビルド → ルートにコピー
#   mise run release     release ビルド → ルートにコピー
#   mise run dev         ビルド後、GUI を起動（kanata は GUI 内から制御）
#   mise run test        ユニットテスト
#   mise run test-install ローカルでインストールスクリプトをテスト
#   mise run reset-uinput uinput 設定をリセット（再テスト用）
#   mise run gen-icons   img/icon.svg からアイコン全サイズを生成
#   mise run gen-ts      Rust の Config 系 type から frontend/src/lib/config.ts を生成 (build 依存に組込済)

[tools]
rust = "1.96"
node = "lts"

[tasks.setup]
description = "Install build & runtime dependencies for Linux + show uinput setup guide"
run = "bash scripts/dev/setup.sh"

[tasks.check-deps]
description = "Verify Tauri system libraries are available (Linux)"
run = "bash scripts/dev/check-deps.sh"

[tasks.sync-kanata-version]
description = "Sync kanata version from kanata-version.txt to all files"
run = "bash scripts/dev/sync-kanata-version.sh"

[tasks.fetch-kanata]
description = "Download kanata binary for development"
run = "bash scripts/dev/fetch-kanata.sh"

[tasks.gen-ts]
description = "Generate TypeScript bindings from Rust types via ts-rs (#172)"
shell = "bash -c"
run = """
set -euo pipefail
TS_RS_EXPORT_DIR="$(pwd)/muhenkan-switch/frontend/src/lib" \
  cargo test -p muhenkan-switch-config --lib export_bindings_
# ts-rs の生成 TS は ESLint/Prettier の規約に合わないため自動整形する
# (Record<string,T> / interface / 1 行 1 フィールド)。
# node_modules が無い場合のみ npm ci で揃える (CI 初回 / 新規 worktree 想定)。
cd muhenkan-switch/frontend
[ -x node_modules/.bin/eslint ] || npm ci
npx --no-install eslint --fix src/lib/config.ts
npx --no-install prettier --write src/lib/config.ts
"""

[tasks.build]
description = "Build workspace (debug)"
depends = ["check-deps", "fetch-kanata", "gen-ts"]
run = "bash scripts/dev/build.sh"

[tasks.release]
description = "Build workspace (release)"
depends = ["check-deps", "fetch-kanata", "gen-ts"]
run = "bash scripts/dev/release.sh"

[tasks.dev]
description = "Build and start GUI"
depends = ["build", "fetch-kanata"]
run = "bash scripts/dev/dev.sh"

[tasks.gen-icons]
description = "Generate app icons from img/icon.svg using @tauri-apps/cli"
shell = "bash -c"
run = "cd muhenkan-switch && npx --yes @tauri-apps/cli@2 icon ../img/icon.svg"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.test-install]
description = "Build release and run install.sh locally (simulates CI release)"
depends = ["release"]
run = "bash scripts/dev/test-install.sh"

[tasks.test-uninstall]
description = "Run uninstall.sh from the install directory"
shell = "bash -c"
run = """
UNINSTALL="$HOME/.local/share/muhenkan-switch/uninstall.sh"
if [ -f "$UNINSTALL" ]; then
  bash "$UNINSTALL"
else
  echo "[test-uninstall] uninstall.sh not found at $UNINSTALL"
  echo "[test-uninstall] muhenkan-switch is not installed."
fi
"""

[tasks.reset-uinput]
description = "Reset uinput permissions for re-testing pkexec dialog"
run = "bash scripts/dev/reset-uinput.sh"
