name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            core_artifact: muhenkan-switch-core
            gui_artifact: muhenkan-switch
            asset_suffix: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            core_artifact: muhenkan-switch-core
            gui_artifact: muhenkan-switch
            asset_suffix: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            core_artifact: muhenkan-switch-core
            gui_artifact: muhenkan-switch
            asset_suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build muhenkan-switch-core
        run: cargo build --release --target ${{ matrix.target }} -p muhenkan-switch-core

      # tauri-build がビルド時に externalBin の実在を確認するため、
      # Linux/macOS でもダミーの sidecar ファイルを用意する（バンドルはしない）
      - name: Prepare sidecar placeholders
        shell: bash
        run: |
          mkdir -p muhenkan-switch/binaries
          cp "target/${{ matrix.target }}/release/${{ matrix.core_artifact }}" \
             "muhenkan-switch/binaries/muhenkan-switch-core-${{ matrix.target }}"
          touch "muhenkan-switch/binaries/kanata_cmd_allowed-${{ matrix.target }}"

      - name: Build muhenkan-switch (GUI)
        run: cargo build --release --target ${{ matrix.target }} -p muhenkan-switch

      - name: Package release
        shell: bash
        run: |
          RELEASE_DIR="muhenkan-switch-rs-${{ matrix.asset_suffix }}"
          mkdir -p "$RELEASE_DIR"

          # muhenkan-switch-core バイナリ
          cp "target/${{ matrix.target }}/release/${{ matrix.core_artifact }}" "$RELEASE_DIR/"

          # muhenkan-switch (GUI) バイナリ
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.gui_artifact }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.gui_artifact }}" "$RELEASE_DIR/"
          fi

          # 設定ファイル
          cp config/default.toml "$RELEASE_DIR/config.toml"

          # kanata 設定ファイル
          cp kanata/muhenkan.kbd "$RELEASE_DIR/"
          cp kanata/muhenkan-macos.kbd "$RELEASE_DIR/"

          # README
          cp README.md "$RELEASE_DIR/"

          # インストール/アンインストールスクリプト
          case "${{ matrix.asset_suffix }}" in
            linux-x64)
              cp scripts/install.sh "$RELEASE_DIR/"
              cp scripts/uninstall.sh "$RELEASE_DIR/"
              cp scripts/update.sh "$RELEASE_DIR/"
              chmod +x "$RELEASE_DIR/install.sh" "$RELEASE_DIR/uninstall.sh" "$RELEASE_DIR/update.sh"
              ;;
            macos-x64|macos-arm64)
              cp scripts/install-macos.sh "$RELEASE_DIR/"
              cp scripts/uninstall-macos.sh "$RELEASE_DIR/"
              cp scripts/update-macos.sh "$RELEASE_DIR/"
              chmod +x "$RELEASE_DIR/install-macos.sh" "$RELEASE_DIR/uninstall-macos.sh" "$RELEASE_DIR/update-macos.sh"
              ;;
          esac

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf "muhenkan-switch-rs-${{ matrix.asset_suffix }}.tar.gz" \
            "muhenkan-switch-rs-${{ matrix.asset_suffix }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: muhenkan-switch-rs-${{ matrix.asset_suffix }}.*

  build-windows-msi:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 1. muhenkan-switch-core をビルド
      - name: Build muhenkan-switch-core
        run: cargo build --release --target x86_64-pc-windows-msvc -p muhenkan-switch-core

      # 2. sidecar 用ディレクトリに target-triple 付きでコピー
      - name: Prepare muhenkan-switch-core sidecar
        shell: bash
        run: |
          mkdir -p muhenkan-switch/binaries
          cp target/x86_64-pc-windows-msvc/release/muhenkan-switch-core.exe \
             muhenkan-switch/binaries/muhenkan-switch-core-x86_64-pc-windows-msvc.exe

      # 3. kanata をダウンロードして sidecar 配置
      #    kanata は zip 形式で配布されているため展開して取り出す
      - name: Download kanata and prepare sidecar
        shell: pwsh
        run: |
          $version = (Get-Content kanata-version.txt).Trim()
          $zipUrl = "https://github.com/jtroo/kanata/releases/download/${version}/windows-binaries-x64.zip"
          $binaryName = "kanata_windows_gui_winIOv2_cmd_allowed_x64.exe"
          Write-Host "Downloading kanata ${version} from ${zipUrl}"
          Invoke-WebRequest -Uri $zipUrl -OutFile "kanata.zip"
          Expand-Archive -Path "kanata.zip" -DestinationPath "kanata-extract"
          $binaryFile = Get-ChildItem -Path "kanata-extract" -Recurse -Filter $binaryName | Select-Object -First 1
          if (-not $binaryFile) { Write-Error "kanata binary not found: $binaryName"; exit 1 }
          Copy-Item $binaryFile.FullName "muhenkan-switch/binaries/kanata_cmd_allowed-x86_64-pc-windows-msvc.exe"

      # 4. cargo tauri build で .msi / NSIS .exe を生成
      - name: Build Windows installer (.msi and NSIS)
        run: npx --yes @tauri-apps/cli@2 build --target x86_64-pc-windows-msvc --bundles msi,nsis
        working-directory: muhenkan-switch

      # 5. 生成されたインストーラーを artifacts にアップロード
      #    Cargo ワークスペースの target/ はルートに置かれるため muhenkan-switch/ プレフィックスは不要
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-msi
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      # 6. Power User 向け zip もビルド・パッケージ
      - name: Package zip release (Power User)
        shell: bash
        run: |
          RELEASE_DIR="muhenkan-switch-rs-windows-x64"
          mkdir -p "$RELEASE_DIR"

          cp target/x86_64-pc-windows-msvc/release/muhenkan-switch-core.exe "$RELEASE_DIR/"
          cp target/x86_64-pc-windows-msvc/release/muhenkan-switch.exe "$RELEASE_DIR/" 2>/dev/null || true
          cp config/default.toml "$RELEASE_DIR/config.toml"
          cp kanata/muhenkan.kbd "$RELEASE_DIR/"
          cp kanata/muhenkan-macos.kbd "$RELEASE_DIR/"
          cp README.md "$RELEASE_DIR/"
          cp scripts/install.ps1 "$RELEASE_DIR/"
          cp scripts/uninstall.ps1 "$RELEASE_DIR/"
          cp scripts/update.ps1 "$RELEASE_DIR/"
          cp scripts/install.bat "$RELEASE_DIR/"
          cp scripts/uninstall.bat "$RELEASE_DIR/"
          cp scripts/update.bat "$RELEASE_DIR/"

      - name: Create zip archive (Windows)
        shell: pwsh
        run: |
          Compress-Archive -Path "muhenkan-switch-rs-windows-x64" `
            -DestinationPath "muhenkan-switch-rs-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: muhenkan-switch-rs-windows-x64.*

  release:
    needs: [build, build-windows-msi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            muhenkan-switch-rs-*.tar.gz
            muhenkan-switch-rs-*.zip
            *.msi
            *-setup.exe
          body: |
            ## muhenkan-switch-rs

            ### Windows インストール（推奨）

            1. 下記から `muhenkan-switch_x64.msi`（または `_x64-setup.exe`）をダウンロード
            2. ダブルクリックしてインストール
            3. スタートメニューから muhenkan-switch を起動

            ### Linux / macOS インストール

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/kimushun1101/muhenkan-switch-rs/main/scripts/get.sh | sh
            ```

            **Windows（上級者向け PowerShell ワンライナー）:**
            ```powershell
            irm https://raw.githubusercontent.com/kimushun1101/muhenkan-switch-rs/main/scripts/get.ps1 | iex
            ```

            ### ダウンロード
            - **Windows (x64) インストーラー**: `muhenkan-switch_x64.msi` / `muhenkan-switch_x64-setup.exe`
            - **Windows (x64) zip（上級者向け）**: `muhenkan-switch-rs-windows-x64.zip`
            - **Linux (x64)**: `muhenkan-switch-rs-linux-x64.tar.gz`
            - **macOS (x64)**: `muhenkan-switch-rs-macos-x64.tar.gz` ⚠️ 未検証
            - **macOS (ARM)**: `muhenkan-switch-rs-macos-arm64.tar.gz` ⚠️ 未検証
          generate_release_notes: true
