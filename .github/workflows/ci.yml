name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: muhenkan-switch/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix muhenkan-switch/frontend ci

      - name: Typecheck frontend (tsc)
        run: npm --prefix muhenkan-switch/frontend run typecheck

      - name: Lint frontend (ESLint)
        run: npm --prefix muhenkan-switch/frontend run lint

      - name: Format check (Prettier)
        run: npm --prefix muhenkan-switch/frontend run format:check

      - name: Test frontend (Vitest)
        run: npm --prefix muhenkan-switch/frontend run test

      - name: Build frontend (Vite)
        run: npm --prefix muhenkan-switch/frontend run build

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'

  psscriptanalyzer:
    # PSScriptAnalyzer は pwsh があれば OS を問わず動くため、
    # 追加セットアップ不要な ubuntu-latest (pwsh プリインストール済み) で実行する
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer on get.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery
          $results = Invoke-ScriptAnalyzer -Path scripts/install/get.ps1 -Severity Warning, Error
          $results | Format-Table -AutoSize
          if ($results.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s) in get.ps1."
            exit 1
          }

  rust-check:
    # Tauri GUI のクロス OS ビルドは重いので release.yml に委ね、CI (Linux) では
    # fmt/clippy/test を含むフルチェックを行う。Windows/macOS 向けの軽量
    # cargo check は rust-check-cross-os で別途行う。
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: muhenkan-switch/frontend/package-lock.json

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # tauri::generate_context! が frontendDist (./frontend/dist) の実在を要求するため、
      # cargo check 前に frontend を build しておく
      - name: Install frontend dependencies
        run: npm --prefix muhenkan-switch/frontend ci

      # ts-rs で Rust 型から再生成した config.ts が commit 済みファイルと一致するか確認。
      # zure があれば「mise run gen-ts && commit」を促してエラー (#172)。
      - name: Verify ts-rs bindings are up-to-date
        shell: bash
        run: |
          TS_RS_EXPORT_DIR="$(pwd)/muhenkan-switch/frontend/src/lib" \
            cargo test -p muhenkan-switch-config --lib export_bindings_
          ( cd muhenkan-switch/frontend
            npx --no-install eslint --fix src/lib/config.ts
            npx --no-install prettier --write src/lib/config.ts
          )
          git diff --exit-code muhenkan-switch/frontend/src/lib/config.ts \
            || { echo "::error::config.ts is out of sync with Rust types. Run 'mise run gen-ts' and commit the result."; exit 1; }

      - name: Build frontend (Vite)
        run: npm --prefix muhenkan-switch/frontend run build

      # tauri-build がビルド時に externalBin の実在を確認するため、
      # ダミー sidecar ファイルを用意する (CI では実バイナリ不要、空ファイルで十分)
      - name: Prepare sidecar placeholders
        shell: bash
        run: |
          mkdir -p muhenkan-switch/binaries
          touch muhenkan-switch/binaries/muhenkan-switch-core-x86_64-unknown-linux-gnu
          touch muhenkan-switch/binaries/kanata_cmd_allowed-x86_64-unknown-linux-gnu

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

  rust-check-cross-os:
    # target_os cfg 分岐 (Windows 18 箇所 / macOS 9 箇所) がタグ push (release.yml)
    # までコンパイルされない問題への対応。fmt/clippy/test は rust-check (Linux)
    # に委ね、ここでは各 OS 上での軽量な cargo check のみを行う。
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: muhenkan-switch/frontend/package-lock.json

      # tauri::generate_context! が frontendDist (./frontend/dist) の実在を要求するため、
      # cargo check 前に frontend を build しておく
      - name: Install frontend dependencies
        run: npm --prefix muhenkan-switch/frontend ci

      - name: Build frontend (Vite)
        run: npm --prefix muhenkan-switch/frontend run build

      # tauri-build がビルド時に externalBin の実在を確認するため、
      # ホストのターゲットトリプルに合わせたダミー sidecar ファイルを用意する
      # (CI では実バイナリ不要、空ファイルで十分)
      - name: Prepare sidecar placeholders
        shell: bash
        run: |
          target="$(rustc -vV | sed -n 's/^host: //p')"
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p muhenkan-switch/binaries
          touch "muhenkan-switch/binaries/muhenkan-switch-core-${target}${ext}"
          touch "muhenkan-switch/binaries/kanata_cmd_allowed-${target}${ext}"

      - name: cargo check
        run: cargo check --workspace
